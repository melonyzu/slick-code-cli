version: 2

project_name: slickcode

builds:
  - main: ./cmd/slickcode
    binary: slickcode
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/melonyzu/slick-code-cli/pkg/version.Version={{ .Version }}
      - -X github.com/melonyzu/slick-code-cli/pkg/version.Commit={{ .Commit }}
      - -X github.com/melonyzu/slick-code-cli/pkg/version.Date={{ .Date }}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  sort: asc

release:
  github:
    owner: melonyzu
    name: slick-code-cli
